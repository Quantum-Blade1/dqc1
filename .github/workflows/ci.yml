name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build, Test, and Upload Logs
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build python3 python3-pip git lld
          # Try to install LLVM 16 tools (FileCheck, llvm-lit). If not available,
          # the job will fall back to system llvm or the pinned toolchain if built.
          sudo apt-get install -y llvm-16 || sudo apt-get install -y llvm

      - name: Bootstrap pinned LLVM/MLIR (clone only)
        run: |
          # Use the repo-provided dev setup to clone the pinned llvm-project tag
          chmod +x scripts/dev_setup.sh
          scripts/dev_setup.sh
          echo "If you want CI to build LLVM/MLIR from source, re-run with --build (not recommended on PR runs)."

      - name: Configure (CMake)
        run: |
          mkdir -p build
          cd build
          cmake -G Ninja -DDQC_ENABLE_TESTS=ON -DCMAKE_BUILD_TYPE=RelWithDebInfo ..

      - name: Build (Ninja)
        run: |
          cd build
          cmake --build . -j $(nproc)

      - name: Install built binaries
        run: |
          cd build
          cmake --install . --prefix _install

      - name: Add installed bin to PATH
        run: echo "${{ github.workspace }}/build/_install/bin" >> $GITHUB_PATH

      - name: Run ctest and capture output
        id: ctest
        shell: bash
        run: |
          cd build
          ctest --output-on-failure 2>&1 | tee ctest.log
          RC=${PIPESTATUS[0]}
          echo "exit_code=$RC" >> $GITHUB_OUTPUT

      - name: Upload test logs on failure
        if: steps.ctest.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: ctest-log
          path: build/ctest.log

      - name: Fail job if tests failed
        if: steps.ctest.outputs.exit_code != '0'
        run: exit ${{ steps.ctest.outputs.exit_code }}
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-smoke:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build git python3 python3-pip pkg-config

      - name: Clone and build LLVM/MLIR (mlir-only)
        run: |
          git clone --depth 1 https://github.com/llvm/llvm-project.git llvm-project
          mkdir llvm-project/build && cd llvm-project/build
          cmake -G Ninja ../llvm -DLLVM_ENABLE_PROJECTS="mlir" -DCMAKE_BUILD_TYPE=Release -DLLVM_TARGETS_TO_BUILD="X86" -DCMAKE_INSTALL_PREFIX=$HOME/llvm-install
          cmake --build . -j 2
          cmake --install . --prefix $HOME/llvm-install

      - name: Configure project
        run: |
          mkdir -p build && cd build
          cmake -G Ninja .. -DMLIR_DIR=$HOME/llvm-install/lib/cmake/mlir -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: |
          cmake --build build -j 2

      - name: Run smoke tests
        run: |
          build/tools/dqc-opt/dqc-opt test/IR/dqc_ir_test.mlir --dqc-interaction-graph --dqc-greedy-reordering -o -

      - name: Upload build logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-log
          path: build/CMakeFiles
